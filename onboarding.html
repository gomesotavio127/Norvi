<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 Estuda Aí - Personalize seu Estudo</title>
    <link rel="stylesheet" href="css/onboarding.css">
</head>
<body>
    <div class="container">
        <div class="onboarding" id="onboarding">

            <div class="logo">🧠</div>
            <div class="titulo">Estuda <span>AI</span></div>
            <div class="subtitulo">Diagnóstico de Rotina de Estudos</div>

            <div class="progresso" id="progresso">
                <!-- Pontos de progresso gerados via JS -->
            </div>

            <div id="diagnostico">
                <div id="perguntas-container">
                    <!-- Pergunta atual gerada via JS -->
                </div>

                <div class="botoes" id="controles" style="margin-top: 20px;">
                    <button class="btn-voltar" id="btn-voltar" onclick="voltarPergunta()" disabled>⬅ Voltar</button>
                    <button class="btn-proximo" id="btn-proximo" onclick="proximaPergunta()" disabled>Próximo ➡</button>
                </div>
            </div>

            <!-- TELA FINAL -->
            <div class="final" id="tela-final">
                <div class="icone-grande" id="final-emoji">🏆</div>
                <h2 id="final-titulo">Seu Plano de Estudos está Pronto!</h2>
                <p>Com base no seu perfil, estruturamos a rotina ideal para você:</p>
                <div class="resumo" id="resumo-final">
                    <!-- Resumo gerado via JS -->
                </div>
                <button class="btn-iniciar" onclick="iniciarApp()">🚀 COMEÇAR A ESTUDAR</button>
            </div>

        </div>
    </div>

    <script src="js/onboarding.js"></script>
</body>
</html>
