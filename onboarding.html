<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Norvi - Sua rotina de estudos simplificada</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #FDFBF7;
            --bg-card: #ffffff;
            --text-main: #3A3A3A;
            --text-muted: #6B7F8A;
            --accent: #C87A4E;
            --accent-hover: #a05d32;
            --success: #8DA89B;
            --border: #E6DED5;
            --shadow-soft: 0 2px 4px rgba(0,0,0,0.02);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.04);
        }

        body.dark-mode {
            --bg-page: #181614;
            --bg-card: #221f1c;
            --text-main: #E6DED5;
            --text-muted: #8DA89B;
            --accent: #C87A4E;
            --accent-hover: #e09468;
            --border: #3A3A3A;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Lora', 'Inter', serif;
            transition: background-color 0.3s, border-color 0.3s, color 0.3s;
        }

        body {
            background: var(--bg-page);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
        }

        .card {
            background: var(--bg-card);
            border: 2px double var(--border); /* Borda dupla artesanal */
            border-radius: 12px;
            padding: 40px 32px;
            box-shadow: var(--shadow-soft);
            text-align: center;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-container {
            display: flex;
            justify-content: center;
            margin-bottom: 16px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            color: var(--accent);
        }

        .titulo {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--text-main);
        }

        .titulo span {
            font-style: italic;
            color: var(--accent);
        }

        .subtitulo {
            font-size: 15px;
            color: var(--text-muted);
            margin-bottom: 32px;
            line-height: 1.6;
        }

        /* Progresso */
        .progresso {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 28px;
        }

        .progresso .ponto {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--border);
            transition: all 0.3s ease;
        }

        .progresso .ponto.ativo {
            background: var(--accent);
            transform: scale(1.2);
        }

        .progresso .ponto.feito {
            background: var(--success);
        }

        /* Opções de Pergunta */
        .opcoes {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 28px;
            text-align: left;
        }

        .opcao {
            background: var(--bg-page);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .opcao:hover {
            border-color: var(--accent);
            background: rgba(200, 122, 78, 0.03);
        }

        .opcao.selecionada {
            border-color: var(--accent);
            background: rgba(200, 122, 78, 0.06);
            color: var(--accent);
            font-weight: 600;
        }

        .opcao-star {
            font-size: 14px;
            color: var(--accent);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .opcao.selecionada .opcao-star {
            opacity: 1;
        }

        /* Botões */
        .botoes {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        button {
            width: 100%;
            padding: 12px 20px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
        }

        .btn-primary:disabled {
            background: var(--border);
            color: var(--text-muted);
            border-color: var(--border);
            cursor: not-allowed;
        }

        .btn-secondary {
            background: var(--bg-page);
            color: var(--text-main);
        }

        .btn-secondary:hover:not(:disabled) {
            background: var(--border);
        }

        .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Formulário de Login/Cadastro */
        .form-group {
            text-align: left;
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            background: var(--bg-page);
            color: var(--text-main);
        }

        .form-input:focus {
            border-color: var(--accent);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 24px;
            cursor: pointer;
            user-select: none;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2100;
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 90%;
            max-width: 340px;
            pointer-events: none;
        }

        .toast {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-left: 4px solid var(--accent);
            padding: 14px 18px;
            border-radius: 8px;
            color: var(--text-main);
            font-size: 13px;
            font-weight: 600;
            box-shadow: var(--shadow-md);
            display: flex;
            align-items: center;
            gap: 10px;
            animation: toastIn 0.3s, toastOut 0.3s 2.7s forwards;
        }

        @keyframes toastIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes toastOut {
            from { transform: translateY(0); opacity: 1; }
            to { transform: translateY(-20px); opacity: 0; }
        }
    </style>
</head>
<body>
    <!-- HEADER DE CONFIGURAÇÕES -->
    <div style="position: fixed; top: 20px; right: 20px; display: flex; gap: 12px; align-items: center; z-index: 1000;">
        <!-- Seletor de Idioma -->
        <select id="langSelector" onchange="changeLanguage(this.value)" style="padding: 6px 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-page); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer; outline: none; box-shadow: var(--shadow-soft);">
            <option value="pt-BR">🇧🇷 PT-BR</option>
            <option value="pt-PT">🇵🇹 PT-PT</option>
            <option value="en">🇺🇸 EN</option>
            <option value="es">🇪🇸 ES</option>
            <option value="fr">🇫🇷 FR</option>
        </select>

        <!-- Toggle Dark Mode -->
        <button onclick="toggleDarkMode()" style="width: auto; padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-page); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; box-shadow: var(--shadow-soft);">
            <i data-lucide="moon" style="width: 16px; height: 16px;"></i> <span id="darkModeText">Escuro</span>
        </button>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <div class="container">
        <!-- TELA INICIAL (LANDING PAGE) -->
        <div class="card" id="tela-inicial">
            <div class="logo-container">
                <!-- Ícone de Bússola SVG Minimalista -->
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon>
                </svg>
            </div>
            <h1 class="titulo"><span>Norvi</span></h1>
            <p class="subtitulo">Foque nos estudos. Construa hábitos.<br>Sua rotina de estudos simplificada.</p>
            <button class="btn-primary" onclick="iniciarDiagnostico()">Começar Diagnóstico</button>
        </div>

        <!-- TELA DIAGNÓSTICO -->
        <div class="card" id="tela-diagnostico" style="display: none;">
            <div class="progresso" id="progresso"></div>
            <div id="pergunta-container"></div>
            <div class="botoes">
                <button class="btn-secondary" id="btn-voltar" onclick="voltarPergunta()" disabled>⬅ Voltar</button>
                <button class="btn-primary" id="btn-proximo" onclick="proximaPergunta()" disabled>Próximo ➡</button>
            </div>
        </div>

        <!-- TELA CADASTRO / LOGIN -->
        <div class="card" id="tela-auth" style="display: none;">
            <div class="logo-container">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </div>
            <h2 class="titulo" style="font-size: 22px; margin-bottom: 8px;">Crie sua conta</h2>
            <p class="subtitulo" style="margin-bottom: 24px;">Salve seu progresso e acesse seu plano personalizado.</p>
            
            <div class="form-group">
                <label for="auth-email">E-mail</label>
                <input type="email" class="form-input" id="auth-email" placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label for="auth-senha">Senha</label>
                <input type="password" class="form-input" id="auth-senha" placeholder="Digite sua senha">
            </div>
            <div class="form-group" id="group-confirmar">
                <label for="auth-confirmar">Confirmar Senha</label>
                <input type="password" class="form-input" id="auth-confirmar" placeholder="Confirme sua senha">
            </div>

            <div class="checkbox-group" onclick="toggleManterConectado()">
                <input type="checkbox" id="auth-manter" style="cursor: pointer;" checked>
                <span>Manter-me conectado neste dispositivo</span>
            </div>

            <button class="btn-primary" id="btn-auth-action" onclick="processarAuth()">Criar Conta</button>
            <p style="font-size: 13px; color: var(--text-muted); margin-top: 16px;">
                <span id="auth-toggle-text">Já tem uma conta?</span> 
                <a href="#" id="auth-toggle-link" onclick="toggleAuthMode()" style="color: var(--accent); font-weight: 700; text-decoration: none;">Entrar</a>
            </p>
        </div>
    </div>

    <script src="js/onboarding.js"></script>
    <script>
        // Inicializa os ícones Lucide
        lucide.createIcons();
    </script>
</body>
</html>
