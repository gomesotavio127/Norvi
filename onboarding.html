<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Norvi - Disciplina que se transforma em hábito</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-page: #FDFBF7;
            --bg-card: #ffffff;
            --text-main: #3A3A3A;
            --text-muted: #6B7F8A;
            --accent: #C87A4E;
            --accent-hover: #a05d32;
            --success: #8DA89B;
            --border: #E6DED5;
            --shadow-soft: 0 4px 20px rgba(0,0,0,0.02);
            --shadow-md: 0 10px 30px rgba(0,0,0,0.04);
        }

        body.dark-mode {
            --bg-page: #181614;
            --bg-card: #221f1c;
            --text-main: #E6DED5;
            --text-muted: #8DA89B;
            --accent: #C87A4E;
            --accent-hover: #e09468;
            --border: #3A3A3A;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Lora', 'Inter', serif;
            transition: background-color 0.3s, border-color 0.3s, color 0.3s;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--bg-page);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header Fixo */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(253, 251, 247, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            z-index: 1000;
        }

        body.dark-mode header {
            background: rgba(24, 22, 20, 0.8);
        }

        .header-logo {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-logo span {
            font-style: italic;
            color: var(--accent);
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }
    </style>
</head>
<body>
    <style>
        /* Seções */
        .secao {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px;
            position: relative;
        }

        .secao-conteudo {
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
        }

        .titulo-secao {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 24px;
            color: var(--text-main);
            text-align: center;
        }

        .titulo-secao span {
            font-style: italic;
            color: var(--accent);
        }

        /* Seção Hero */
        #tela-inicial {
            text-align: center;
            background: radial-gradient(circle at center, rgba(200, 122, 78, 0.03) 0%, transparent 70%);
        }

        .hero-logo-container {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }

        .hero-logo-icon {
            width: 64px;
            height: 64px;
            color: var(--accent);
            animation: pulse 3s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        .hero-titulo {
            font-family: 'Playfair Display', serif;
            font-size: 64px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text-main);
        }

        .hero-titulo span {
            font-style: italic;
            color: var(--accent);
        }

        .subtitulo {
            font-size: 18px;
            color: var(--text-muted);
            margin-bottom: 40px;
            line-height: 1.6;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Botões */
        .btn-primary {
            background: var(--accent);
            color: white;
            border: none;
            padding: 16px 36px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: var(--shadow-soft);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(200, 122, 78, 0.2);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-secondary:hover:not(:disabled) {
            background: rgba(0, 0, 0, 0.02);
            border-color: var(--text-main);
        }

        .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
    <style>
        /* Seção O Problema & A Solução */
        .grid-duas-colunas {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }

        .coluna-texto {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .coluna-imagem {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            border: 2px double var(--border);
            box-shadow: var(--shadow-md);
        }

        .coluna-imagem img {
            width: 100%;
            height: auto;
            display: block;
            filter: sepia(0.15) contrast(0.95) brightness(0.95);
            transition: transform 0.5s ease;
        }

        .coluna-imagem:hover img {
            transform: scale(1.03);
        }

        .texto-narrativo {
            font-size: 18px;
            line-height: 1.8;
            color: var(--text-main);
            margin-bottom: 20px;
        }

        .texto-narrativo.destaque {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-style: italic;
            color: var(--accent);
            border-left: 3px solid var(--accent);
            padding-left: 20px;
            margin: 30px 0;
        }

        /* Seção Vantagens */
        .grid-vantagens {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            margin-top: 40px;
        }

        .card-vantagem {
            background: var(--bg-card);
            border: 2px double var(--border);
            border-radius: 16px;
            padding: 32px;
            box-shadow: var(--shadow-soft);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .card-vantagem:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
            border-color: var(--accent);
        }

        .vantagem-icone-wrapper {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: rgba(200, 122, 78, 0.06);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .vantagem-titulo {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--text-main);
        }

        .vantagem-desc {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        /* Seção Depoimentos */
        .grid-depoimentos {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-top: 40px;
        }

        .card-depoimento {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            box-shadow: var(--shadow-soft);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .depoimento-texto {
            font-size: 15px;
            line-height: 1.7;
            color: var(--text-main);
            font-style: italic;
            margin-bottom: 24px;
        }

        .depoimento-autor-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .depoimento-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            filter: sepia(0.15);
            border: 1px solid var(--border);
        }

        .depoimento-autor {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-main);
        }
    </style>
    <style>
        /* Seção Diagnóstico */
        #diagnostico {
            background: radial-gradient(circle at center, rgba(200, 122, 78, 0.02) 0%, transparent 70%);
        }

        .diagnostico-wrapper {
            width: 100%;
            max-width: 520px;
            margin: 0 auto;
        }

        .diagnostico-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .diagnostico-badge {
            color: var(--accent);
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
            margin-bottom: 8px;
        }

        .diagnostico-title {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--text-main);
        }

        /* Card do Diagnóstico e Auth */
        .card {
            background: var(--bg-card);
            border: 2px double var(--border);
            border-radius: 16px;
            padding: 40px 32px;
            box-shadow: var(--shadow-md);
            text-align: center;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Progresso */
        .progresso {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 28px;
        }

        .progresso .ponto {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--border);
            transition: all 0.3s ease;
        }

        .progresso .ponto.ativo {
            background: var(--accent);
            transform: scale(1.2);
        }

        .progresso .ponto.feito {
            background: var(--success);
        }

        /* Opções de Pergunta */
        .opcoes {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 28px;
            text-align: left;
        }

        .opcao {
            background: var(--bg-page);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .opcao:hover {
            border-color: var(--accent);
            background: rgba(200, 122, 78, 0.03);
        }

        .opcao.selecionada {
            border-color: var(--accent);
            background: rgba(200, 122, 78, 0.06);
            color: var(--accent);
            font-weight: 600;
        }

        .opcao-star {
            font-size: 14px;
            color: var(--accent);
            opacity: 0.7;
        }

        .botoes {
            display: flex;
            gap: 12px;
            justify-content: space-between;
        }

        .botoes button {
            flex: 1;
        }

        /* Formulários */
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-page);
            color: var(--text-main);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-input:focus {
            border-color: var(--accent);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
            text-align: left;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-muted);
            user-select: none;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }

        .toast {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: var(--shadow-md);
            animation: toastIn 0.3s ease forwards;
        }

        @keyframes toastIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Footer */
        footer {
            border-top: 1px solid var(--border);
            padding: 60px 20px;
            text-align: center;
            background: var(--bg-page);
        }

        .footer-logo {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .footer-logo span {
            font-style: italic;
            color: var(--accent);
        }

        .footer-tagline {
            font-size: 14px;
            color: var(--text-muted);
            font-style: italic;
            margin-bottom: 24px;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 24px;
        }

        .footer-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: var(--accent);
        }

        .footer-copyright {
            font-size: 12px;
            color: var(--text-muted);
            opacity: 0.8;
        }

        /* Responsividade */
        @media (max-width: 768px) {
            header { padding: 0 20px; }
            .grid-duas-colunas { grid-template-columns: 1fr; gap: 40px; }
            .grid-vantagens { grid-template-columns: 1fr; }
            .grid-depoimentos { grid-template-columns: 1fr; }
            .hero-titulo { font-size: 44px; }
            .titulo-secao { font-size: 28px; }
        }
    </style>
    <!-- HEADER DE CONFIGURAÇÕES -->
    <header>
        <a href="#" class="header-logo">✦ Nor<span>vi</span></a>
        <div class="header-actions">
            <!-- Seletor de Idioma -->
            <select id="langSelector" onchange="changeLanguage(this.value)" style="padding: 6px 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-page); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer; outline: none; box-shadow: var(--shadow-soft);">
                <option value="pt-BR">🇧🇷 PT-BR</option>
                <option value="pt-PT">🇵🇹 PT-PT</option>
                <option value="en">🇺🇸 EN</option>
                <option value="es">🇪🇸 ES</option>
                <option value="fr">🇫🇷 FR</option>
            </select>

            <!-- Toggle Dark Mode -->
            <button onclick="toggleDarkMode()" style="width: auto; padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-page); color: var(--text-main); font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; box-shadow: var(--shadow-soft);">
                <i data-lucide="moon" style="width: 16px; height: 16px;"></i> <span id="darkModeText">Escuro</span>
            </button>
        </div>
    </header>

    <div class="toast-container" id="toastContainer"></div>

    <!-- SEÇÃO 1: HERO -->
    <section id="tela-inicial" class="secao">
        <div class="secao-conteudo">
            <div class="hero-logo-container">
                <svg class="hero-logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon>
                </svg>
            </div>
            <h1 class="hero-titulo">✦ Nor<span>vi</span></h1>
            <p class="subtitulo">Foque nos estudos. Construa hábitos.<br>Sua rotina de estudos simplificada.</p>
            <button class="btn-primary" onclick="iniciarDiagnostico()">Começar Jornada <i data-lucide="arrow-right" style="width: 18px; height: 18px;"></i></button>
        </div>
    </section>
