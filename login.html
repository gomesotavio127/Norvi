<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Norvi - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --off-white: #FDFBF7;
            --cinza-pedra: #3A3A3A;
            --siena-queimado: #C87A4E;
            --azul-cinza: #6B7F8A;
            --marrom-claro: #E6DED5;
            --fonte-titulo: 'Playfair Display', serif;
            --fonte-corpo: 'Inter', sans-serif;
            --bg-body: var(--off-white);
            --bg-card: #FFFFFF;
            --texto-principal: var(--cinza-pedra);
            --texto-secundario: var(--azul-cinza);
            --borda: var(--marrom-claro);
            --radius: 0.75rem;
            --erro: #D45A5A;
            --sucesso: #5A9A7A;
        }
        [data-theme="dark"] {
            --off-white: #1A1A1A;
            --cinza-pedra: #E8E0D8;
            --siena-queimado: #D48A5A;
            --azul-cinza: #9A9A9A;
            --marrom-claro: #3A3A3A;
            --bg-body: #121212;
            --bg-card: #1E1E1E;
            --texto-principal: #E8E0D8;
            --texto-secundario: #9A9A9A;
            --borda: #3A3A3A;
            --erro: #D45A5A;
            --sucesso: #5A9A7A;
        }
        body {
            background-color: var(--bg-body);
            color: var(--texto-principal);
            font-family: var(--fonte-corpo);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            transition: background var(--transicao), color var(--transicao);
        }
        .login-container {
            background: var(--bg-card);
            border: 1px solid var(--borda);
            border-radius: var(--radius);
            max-width: 400px;
            width: 100%;
            padding: 2.5rem 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
            animation: slideUp 0.5s ease both;
        }
        @keyframes slideUp {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.25rem;
        }
        .logo h1 {
            font-family: var(--fonte-titulo);
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--texto-principal);
        }
        .logo h1 span {
            color: var(--siena-queimado);
        }
        .tagline {
            font-family: var(--fonte-titulo);
            font-style: italic;
            font-size: 0.9rem;
            color: var(--texto-secundario);
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--borda);
            padding-bottom: 0.75rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.3rem;
            color: var(--texto-principal);
        }
        .form-group input {
            width: 100%;
            padding: 0.7rem 0.9rem;
            font-family: var(--fonte-corpo);
            font-size: 0.95rem;
            border: 1px solid var(--borda);
            border-radius: 0.5rem;
            background: var(--bg-body);
            color: var(--texto-principal);
            transition: border-color 0.2s ease;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--siena-queimado);
        }
        .btn-primary {
            width: 100%;
            padding: 0.8rem;
            font-family: var(--fonte-corpo);
            font-size: 1rem;
            font-weight: 600;
            background-color: var(--siena-queimado);
            color: #fff;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        .btn-primary:hover {
            background-color: #B56A3E;
        }
        .erro-login {
            color: var(--erro);
            font-size: 0.85rem;
            text-align: center;
            margin-top: 0.5rem;
            display: none;
        }
        .erro-login.visivel {
            display: block;
        }
        .sucesso-login {
            color: var(--sucesso);
            font-size: 0.85rem;
            text-align: center;
            margin-top: 0.5rem;
            display: none;
        }
        .sucesso-login.visivel {
            display: block;
        }
        .register-link {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.85rem;
            color: var(--texto-secundario);
        }
        .register-link a {
            color: var(--siena-queimado);
            text-decoration: none;
            font-weight: 600;
        }
        .register-link a:hover {
            text-decoration: underline;
        }
        .tema-btn {
            position: fixed;
            top: 1rem;
            right: 1rem;
            background: transparent;
            border: 1px solid var(--borda);
            border-radius: 0.3rem;
            padding: 0.2rem 0.6rem;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--texto-secundario);
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: var(--fonte-corpo);
        }
        .tema-btn:hover {
            border-color: var(--siena-queimado);
            color: var(--siena-queimado);
        }
        .recuperar-senha {
            text-align: right;
            font-size: 0.75rem;
            margin-top: -0.3rem;
            margin-bottom: 0.5rem;
        }
        .recuperar-senha a {
            color: var(--texto-secundario);
            text-decoration: none;
        }
        .recuperar-senha a:hover {
            color: var(--siena-queimado);
            text-decoration: underline;
        }
        .form-group-checkbox {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin: 0.5rem 0 1.5rem 0;
        }
        .form-group-checkbox input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--siena-queimado);
            cursor: pointer;
        }
        .form-group-checkbox label {
            font-size: 0.9rem;
            color: var(--texto-principal);
            cursor: pointer;
            user-select: none;
        }
    </style>
</head>
<body>

    <button class="tema-btn" id="temaBtn">🌙</button>

    <div class="login-container">
        <div class="logo">
            <h1>Norvi <span>✦</span></h1>
        </div>
        <div class="tagline">Foque nos estudos. Construa hábitos.</div>

        <h2 style="font-size:1.2rem; margin-bottom:0.5rem;">Entrar</h2>
        <p style="color:var(--texto-secundario); font-size:0.9rem; margin-bottom:1.5rem;">Acesse sua conta.</p>

        <form id="formLogin">
            <div class="form-group">
                <label for="email">E-mail ou Nome de Usuário</label>
                <input type="text" id="email" placeholder="seu@email.com" required />
            </div>
            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Digite sua senha" required />
            </div>
            <div class="recuperar-senha">
                <a href="#" id="linkRecuperar">Esqueceu a senha?</a>
            </div>

            <div class="form-group-checkbox">
                <input type="checkbox" id="manter-conectado" checked />
                <label for="manter-conectado">Manter-me conectado</label>
            </div>

            <div class="erro-login" id="erroLogin">❌ Usuário ou senha incorretos.</div>
            <div class="sucesso-login" id="sucessoLogin">✅ Redirecionando...</div>
            <button type="submit" class="btn-primary" id="btnLogin">Entrar</button>
        </form>

        <div class="register-link">
            Não tem uma conta? <a href="index.html#diagnostico">Faça o diagnóstico primeiro</a>
        </div>
    </div>

    <script>
        function alternarTema() {
            const html = document.documentElement;
            const atual = html.getAttribute('data-theme');
            const novo = atual === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', novo);
            document.getElementById('temaBtn').textContent = novo === 'dark' ? '☀️' : '🌙';
            localStorage.setItem('norvi_tema', novo);
        }
        const tema = localStorage.getItem('norvi_tema') || 'light';
        document.documentElement.setAttribute('data-theme', tema);
        document.getElementById('temaBtn').textContent = tema === 'dark' ? '☀️' : '🌙';
        document.getElementById('temaBtn').addEventListener('click', alternarTema);

        const preferencia = localStorage.getItem('norvi_manterConectado');
        const checkbox = document.getElementById('manter-conectado');
        if (preferencia === 'true') checkbox.checked = true;
        else if (preferencia === 'false') checkbox.checked = false;

        document.getElementById('formLogin').addEventListener('submit', function(e) {
            e.preventDefault();

            const login = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value.trim();
            const manterConectado = checkbox.checked;
            const erro = document.getElementById('erroLogin');
            const sucesso = document.getElementById('sucessoLogin');
            const btn = document.getElementById('btnLogin');

            erro.classList.remove('visivel');
            sucesso.classList.remove('visivel');

            // Admin fixo
            if ((login === 'admin@norvi.com' || login === 'SrPão') && senha === 'Reipao20114377!') {
                const sessao = { email: 'admin@norvi.com', nome: 'SrPão', tipo: 'admin' };
                localStorage.setItem('norvi_sessao', JSON.stringify(sessao));
                localStorage.setItem('norvi_manterConectado', manterConectado ? 'true' : 'false');
                sucesso.textContent = '✅ Bem-vindo, Admin!';
                sucesso.classList.add('visivel');
                btn.disabled = true;
                btn.textContent = 'Redirecionando...';
                setTimeout(() => { window.location.href = 'dashboard-admin.html'; }, 800);
                return;
            }

            const usuariosStr = localStorage.getItem('norvi_usuarios');
            const usuarios = usuariosStr ? JSON.parse(usuariosStr) : [];

            if (usuarios.length === 0) {
                erro.textContent = '❌ Nenhum usuário cadastrado. Faça o diagnóstico primeiro.';
                erro.classList.add('visivel');
                return;
            }

            const usuarioEncontrado = usuarios.find(u =>
                u.email === login ||
                u.nome === login ||
                u.nome?.toLowerCase() === login.toLowerCase()
            );

            if (!usuarioEncontrado) {
                erro.textContent = '❌ Usuário não encontrado. Faça o diagnóstico primeiro.';
                erro.classList.add('visivel');
                return;
            }

            if (usuarioEncontrado.status === 'banido') {
                erro.textContent = '⛔ Conta banida.';
                erro.classList.add('visivel');
                return;
            }

            if (usuarioEncontrado.senha !== senha) {
                erro.textContent = '❌ Senha incorreta.';
                erro.classList.add('visivel');
                return;
            }

            const sessao = {
                email: usuarioEncontrado.email,
                nome: usuarioEncontrado.nome || 'Usuário',
                tipo: usuarioEncontrado.tipo || 'normal'
            };
            localStorage.setItem('norvi_sessao', JSON.stringify(sessao));
            localStorage.setItem('norvi_manterConectado', manterConectado ? 'true' : 'false');

            sucesso.textContent = '✅ Login realizado!';
            sucesso.classList.add('visivel');
            btn.disabled = true;
            btn.textContent = 'Redirecionando...';

            setTimeout(() => {
                if (sessao.tipo === 'admin') window.location.href = 'dashboard-admin.html';
                else if (sessao.tipo === 'vip') window.location.href = 'dashboard-vip.html';
                else window.location.href = 'dashboard.html';
            }, 800);
        });

        document.getElementById('linkRecuperar').addEventListener('click', function(e) {
            e.preventDefault();
            const login = document.getElementById('email').value.trim();
            if (!login) { alert('Digite seu e-mail ou nome de usuário.'); return; }
            const usuariosStr = localStorage.getItem('norvi_usuarios');
            const usuarios = usuariosStr ? JSON.parse(usuariosStr) : [];
            const user = usuarios.find(u =>
                u.email === login ||
                u.nome === login ||
                u.nome?.toLowerCase() === login.toLowerCase()
            );
            if (user) {
                alert(`🔑 Sua senha é: ${user.senha}`);
            } else {
                alert('❌ Usuário não encontrado.');
            }
        });

        document.getElementById('senha').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('formLogin').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
