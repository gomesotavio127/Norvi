<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Norvi - Modo de Estudo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --off-white: #FDFBF7;
            --cinza-pedra: #3A3A3A;
            --siena-queimado: #C87A4E;
            --verde-salvia: #8DA89B;
            --azul-cinza: #6B7F8A;
            --marrom-claro: #E6DED5;
            --fonte-titulo: 'Playfair Display', serif;
            --fonte-corpo: 'Inter', sans-serif;
            --bg-body: var(--off-white);
            --bg-card: #FFFFFF;
            --texto-principal: var(--cinza-pedra);
            --texto-secundario: var(--azul-cinza);
            --borda: var(--marrom-claro);
            --sombra: rgba(0, 0, 0, 0.04);
            --transicao: 0.3s ease;
            --radius: 0.75rem;
            --sucesso: #5A9A7A;
            --erro: #D45A5A;
        }
        [data-theme="dark"] {
            --off-white: #1A1A1A;
            --cinza-pedra: #E8E0D8;
            --siena-queimado: #D48A5A;
            --verde-salvia: #7A9A8A;
            --azul-cinza: #9A9A9A;
            --marrom-claro: #3A3A3A;
            --bg-body: #121212;
            --bg-card: #1E1E1E;
            --texto-principal: #E8E0D8;
            --texto-secundario: #9A9A9A;
            --borda: #3A3A3A;
            --sombra: rgba(0, 0, 0, 0.3);
            --sucesso: #5A9A7A;
            --erro: #D45A5A;
        }
        body {
            background: var(--bg-body);
            color: var(--texto-principal);
            font-family: var(--fonte-corpo);
            min-height: 100vh;
            transition: background var(--transicao), color var(--transicao);
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: var(--bg-card);
            border-bottom: 1px solid var(--borda);
            padding: 0.5rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            min-height: 56px;
            backdrop-filter: blur(8px);
            transition: background var(--transicao), border var(--transicao);
        }
        .top-bar .logo-mini {
            font-family: var(--fonte-titulo);
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--texto-principal);
            text-decoration: none;
        }
        .top-bar .logo-mini span {
            color: var(--siena-queimado);
        }
        .top-bar-acoes {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }
        .btn-voltar-estudo {
            background: transparent;
            border: 1px solid var(--borda);
            border-radius: 0.3rem;
            padding: 0.2rem 0.8rem;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--texto-secundario);
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: var(--fonte-corpo);
            text-decoration: none;
        }
        .btn-voltar-estudo:hover {
            border-color: var(--siena-queimado);
            color: var(--siena-queimado);
        }
        .tema-btn {
            background: transparent;
            border: 1px solid var(--borda);
            border-radius: 0.3rem;
            padding: 0.2rem 0.6rem;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--texto-secundario);
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: var(--fonte-corpo);
        }
        .tema-btn:hover {
            border-color: var(--siena-queimado);
            color: var(--siena-queimado);
        }

        .estudo-main {
            margin-top: 4.5rem;
            padding: 2rem 0;
        }

        .slide-container {
            background: var(--bg-card);
            border: 1px solid var(--borda);
            border-radius: var(--radius);
            padding: 2.5rem;
            box-shadow: 0 8px 32px var(--sombra);
            transition: background var(--transicao), border var(--transicao);
            min-height: 450px;
            position: relative;
        }

        .slide-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--borda);
        }
        .slide-header .materia {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--siena-queimado);
        }
        .slide-header .progresso-slide {
            font-size: 0.8rem;
            color: var(--texto-secundario);
        }

        .slide-content {
            margin-bottom: 2rem;
        }
        .slide-content h2 {
            font-family: var(--fonte-titulo);
            font-size: 1.6rem;
            margin-bottom: 0.5rem;
            color: var(--texto-principal);
        }
        .slide-content .subtitulo {
            font-size: 0.9rem;
            color: var(--texto-secundario);
            margin-bottom: 1.5rem;
        }
        .slide-content .conteudo {
            font-size: 1rem;
            line-height: 1.8;
            color: var(--texto-principal);
        }
        .slide-content .conteudo .destaque {
            background: rgba(200, 122, 78, 0.12);
            padding: 0.8rem 1.2rem;
            border-radius: 0.5rem;
            border-left: 4px solid var(--siena-queimado);
            margin: 1rem 0;
        }
        .slide-content .conteudo .exemplo {
            background: var(--bg-body);
            padding: 0.8rem 1.2rem;
            border-radius: 0.5rem;
            border: 1px solid var(--borda);
            margin: 1rem 0;
            font-family: monospace;
            font-size: 0.95rem;
        }

        .slide-questoes {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--borda);
        }
        .slide-questoes h4 {
            margin-bottom: 0.8rem;
            font-size: 0.95rem;
        }
        .questao-item {
            margin-bottom: 1rem;
            padding: 0.8rem 1rem;
            border: 1px solid var(--borda);
            border-radius: 0.5rem;
            background: var(--bg-body);
        }
        .questao-item .pergunta {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.3rem;
        }
        .questao-item .opcoes {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        .questao-item .opcoes label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            cursor: pointer;
            padding: 0.2rem 0.4rem;
            border-radius: 0.3rem;
            transition: background 0.2s ease;
        }
        .questao-item .opcoes label:hover {
            background: var(--bg-body);
        }
        .questao-item .opcoes input[type="radio"] {
            accent-color: var(--siena-queimado);
        }
        .questao-item .resposta-feedback {
            font-size: 0.8rem;
            margin-top: 0.3rem;
            display: none;
        }
        .questao-item .resposta-feedback.visivel {
            display: block;
        }
        .questao-item .resposta-feedback.correto {
            color: var(--sucesso);
        }
        .questao-item .resposta-feedback.errado {
            color: var(--erro);
        }

        .slide-navegacao {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--borda);
            flex-wrap: wrap;
            gap: 0.8rem;
        }
        .slide-navegacao .btn-nav {
            padding: 0.6rem 1.8rem;
            font-family: var(--fonte-corpo);
            font-weight: 600;
            font-size: 0.9rem;
            color: #fff;
            background: var(--siena-queimado);
            border: none;
            border-radius: 2rem;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
        }
        .slide-navegacao .btn-nav:hover:not(:disabled) {
            background: #B56A3E;
            transform: translateY(-2px);
        }
        .slide-navegacao .btn-nav:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }
        .slide-navegacao .btn-nav.secundario {
            background: transparent;
            color: var(--texto-secundario);
            border: 1px solid var(--borda);
        }
        .slide-navegacao .btn-nav.secundario:hover:not(:disabled) {
            background: var(--borda);
            color: var(--texto-principal);
        }
        .slide-navegacao .progresso-texto {
            font-size: 0.85rem;
            color: var(--texto-secundario);
        }

        .feedback-global {
            position: fixed;
            top: 5rem;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            padding: 0.7rem 1.8rem;
            border-radius: 0.5rem;
            font-weight: 500;
            font-size: 0.9rem;
            z-index: 3000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, transform 0.4s ease, visibility 0.4s ease;
            max-width: 90%;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
        }
        .feedback-global.visivel {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }
        .feedback-global.sucesso {
            background: var(--sucesso);
            color: #fff;
        }
        .feedback-global.erro {
            background: var(--erro);
            color: #fff;
        }
        .feedback-global.info {
            background: var(--azul-cinza);
            color: #fff;
        }

        @media (max-width: 600px) {
            .slide-container {
                padding: 1.5rem 1rem;
            }
            .slide-content h2 {
                font-size: 1.3rem;
            }
            .slide-navegacao {
                flex-direction: column;
                align-items: stretch;
            }
            .slide-navegacao .btn-nav {
                text-align: center;
                padding: 0.5rem 1rem;
            }
            .questao-item {
                padding: 0.6rem 0.8rem;
            }
        }
    </style>
</head>
<body>

    <header class="top-bar">
        <a href="dashboard.html" class="logo-mini">Norvi <span>✦</span></a>
        <div class="top-bar-acoes">
            <span style="font-size:0.8rem;color:var(--texto-secundario);">📚 Modo Estudo</span>
            <button class="tema-btn" id="temaBtn">🌙</button>
            <a href="dashboard.html" class="btn-voltar-estudo">← Voltar</a>
        </div>
    </header>

    <main class="estudo-main">
        <div class="container">
            <div class="slide-container" id="slideContainer">

                <div class="slide-header">
                    <span class="materia" id="materiaLabel">Matemática</span>
                    <span class="progresso-slide" id="progressoSlide">1 / 5</span>
                </div>

                <div class="slide-content" id="slideContent">
                    <!-- Injetado via JS -->
                </div>

                <div class="slide-navegacao">
                    <button class="btn-nav secundario" id="btnAnterior" disabled>← Anterior</button>
                    <span class="progresso-texto" id="progressoTexto">Slide 1 de 5</span>
                    <button class="btn-nav" id="btnProximo">Próximo →</button>
                </div>

            </div>
        </div>
    </main>

    <script>
        (function() {
            'use strict';

            // ============================================================
            // DADOS DO ESTUDO (CONTEÚDO + QUESTÕES)
            // ============================================================

            const conteudoEstudo = [{
                materia: 'Matemática',
                titulo: 'Conjuntos Numéricos',
                subtitulo: 'Entenda os principais conjuntos numéricos',
                conteudo: `
                            <p>Os conjuntos numéricos são agrupamentos de números que compartilham características semelhantes.</p>
                            <div class="destaque">
                                <strong>ℕ = Números Naturais:</strong> {0, 1, 2, 3, 4, ...}
                            </div>
                            <div class="destaque">
                                <strong>ℤ = Números Inteiros:</strong> {..., -3, -2, -1, 0, 1, 2, 3, ...}
                            </div>
                            <div class="destaque">
                                <strong>ℚ = Números Racionais:</strong> Todos os números que podem ser escritos como fração.
                            </div>
                            <div class="destaque">
                                <strong>ℝ = Números Reais:</strong> União de todos os conjuntos anteriores.
                            </div>
                            <p><em>Exemplo:</em> O número 3,5 pertence ao conjunto dos Racionais e Reais.</p>
                        `,
                questoes: [
                    { pergunta: 'Qual conjunto contém o número 0?', opcoes: ['A) Naturais', 'B) Inteiros',
                            'C) Racionais', 'D) Todos os anteriores'
                        ], correta: 3 },
                    { pergunta: 'O número -5 pertence a qual conjunto?', opcoes: ['A) Naturais',
                            'B) Inteiros', 'C) Racionais', 'D) Reais'
                        ], correta: 1 },
                    { pergunta: 'Qual é a definição correta dos Números Racionais?', opcoes: [
                            'A) Números que podem ser escritos como fração',
                            'B) Números decimais não exatos',
                            'C) Números positivos apenas',
                            'D) Números complexos'
                        ], correta: 0 }
                ]
            }, {
                materia: 'Matemática',
                titulo: 'Funções do 1º Grau',
                subtitulo: 'Aprenda a base das funções lineares',
                conteudo: `
                            <p>Uma função do 1º grau é da forma <strong>f(x) = ax + b</strong>, onde <strong>a</strong> é o coeficiente angular e <strong>b</strong> é o coeficiente linear.</p>
                            <div class="exemplo">
                                Exemplo: f(x) = 2x + 3<br>
                                Se x = 1, f(1) = 2·1 + 3 = 5
                            </div>
                            <div class="destaque">
                                <strong>Coeficiente angular (a):</strong> determina a inclinação da reta.<br>
                                <strong>Coeficiente linear (b):</strong> ponto onde a reta corta o eixo y.
                            </div>
                        `,
                questoes: [
                    { pergunta: 'Qual é o coeficiente angular de f(x) = 3x - 2?', opcoes: ['A) -2', 'B) 3',
                            'C) -3', 'D) 2'
                        ], correta: 1 },
                    { pergunta: 'Qual é o valor de f(2) para f(x) = 4x + 1?', opcoes: ['A) 8', 'B) 9',
                            'C) 7', 'D) 10'
                        ], correta: 1 },
                    { pergunta: 'O que representa o coeficiente linear?', opcoes: [
                            'A) A inclinação da reta',
                            'B) O ponto onde a reta corta o eixo y',
                            'C) O ponto onde a reta corta o eixo x',
                            'D) A raiz da função'
                        ], correta: 1 }
                ]
            }, {
                materia: 'História',
                titulo: 'Grécia Antiga - Pólis',
                subtitulo: 'Entenda o conceito de cidade-estado grega',
                conteudo: `
                            <p>A <strong>pólis</strong> era a cidade-estado grega, o centro da vida política, social e cultural.</p>
                            <div class="destaque">
                                <strong>Principais características:</strong><br>
                                • Autonomia política e econômica<br>
                                • Governo próprio e leis próprias<br>
                                • Culto religioso compartilhado<br>
                                • Cidadãos participavam da política
                            </div>
                            <p>As principais pólis foram <strong>Atenas</strong> e <strong>Esparta</strong>, com modelos políticos diferentes: democracia e oligarquia.</p>
                        `,
                questoes: [
                    { pergunta: 'O que era a pólis na Grécia Antiga?', opcoes: [
                            'A) Uma cidade-estado grega',
                            'B) Um templo religioso',
                            'C) Um tipo de governo',
                            'D) Uma escola de filosofia'
                        ], correta: 0 },
                    { pergunta: 'Quais eram as duas pólis mais conhecidas?', opcoes: [
                            'A) Tebas e Corinto',
                            'B) Atenas e Esparta',
                            'C) Olímpia e Delfos',
                            'D) Micenas e Troia'
                        ], correta: 1 },
                    { pergunta: 'Qual modelo político era praticado em Atenas?', opcoes: [
                            'A) Monarquia',
                            'B) Oligarquia',
                            'C) Democracia',
                            'D) Tirania'
                        ], correta: 2 }
                ]
            }, {
                materia: 'Física',
                titulo: 'Cinemática - MRU',
                subtitulo: 'Movimento Retilíneo Uniforme',
                conteudo: `
                            <p>O <strong>Movimento Retilíneo Uniforme (MRU)</strong> ocorre quando um objeto se move em linha reta com velocidade constante.</p>
                            <div class="destaque">
                                <strong>Fórmula principal:</strong><br>
                                S = S₀ + v·t
                            </div>
                            <div class="exemplo">
                                Exemplo: Um carro parte do km 0 com velocidade de 60 km/h.<br>
                                Após 2 horas, estará no km 120.<br>
                                S = 0 + 60·2 = 120 km
                            </div>
                            <p><strong>Características:</strong> Aceleração nula e velocidade constante.</p>
                        `,
                questoes: [
                    { pergunta: 'Qual a fórmula do MRU?', opcoes: ['A) S = S₀ + v·t', 'B) v = S/t',
                            'C) S = v·t', 'D) S = S₀ + a·t²'
                        ], correta: 0 },
                    { pergunta: 'Em um MRU, a aceleração é:', opcoes: ['A) Constante', 'B) Nula',
                            'C) Variável', 'D) Negativa'
                        ], correta: 1 },
                    { pergunta: 'Um carro a 80 km/h percorre quantos km em 3 horas?', opcoes: [
                            'A) 160 km', 'B) 200 km', 'C) 240 km', 'D) 280 km'
                        ], correta: 2 }
                ]
            }, {
                materia: 'Português',
                titulo: 'Interpretação de Texto',
                subtitulo: 'Dicas para interpretar melhor',
                conteudo: `
                            <p>A <strong>interpretação de texto</strong> é a habilidade de compreender o que está escrito, além das palavras literais.</p>
                            <div class="destaque">
                                <strong>Dicas para interpretar melhor:</strong><br>
                                1. Leia o texto completo primeiro<br>
                                2. Identifique o tema central<br>
                                3. Preste atenção às palavras-chave<br>
                                4. Relacione as informações<br>
                                5. Faça perguntas sobre o texto
                            </div>
                            <p><em>Exemplo:</em> "O céu estava nublado, mas não chovia." → A ideia é que havia possibilidade de chuva, mas não ocorreu.</p>
                        `,
                questoes: [
                    { pergunta: 'Qual é a primeira dica para interpretar um texto?', opcoes: [
                            'A) Identificar o tema central',
                            'B) Ler o texto completo primeiro',
                            'C) Prestar atenção às palavras-chave',
                            'D) Fazer perguntas sobre o texto'
                        ], correta: 1 },
                    { pergunta: '"O céu estava nublado, mas não chovia." O que isso indica?', opcoes: [
                            'A) Que estava chovendo',
                            'B) Que havia possibilidade de chuva',
                            'C) Que o céu estava limpo',
                            'D) Que era inverno'
                        ], correta: 1 },
                    { pergunta: 'O que é interpretação de texto?', opcoes: [
                            'A) Decorar o texto',
                            'B) Compreender o que está escrito',
                            'C) Resumir o texto',
                            'D) Escrever um novo texto'
                        ], correta: 1 }
                ]
            }];

            // ============================================================
            // ESTADO
            // ============================================================

            let slideAtual = 0;
            let respostasQuestoes = {};

            // ============================================================
            // RENDERIZAÇÃO
            // ============================================================

            function renderizarSlide() {
                const slide = conteudoEstudo[slideAtual];
                const totalSlides = conteudoEstudo.length;

                document.getElementById('materiaLabel').textContent = slide.materia;
                document.getElementById('progressoSlide').textContent = `${slideAtual + 1} / ${totalSlides}`;
                document.getElementById('progressoTexto').textContent = `Slide ${slideAtual + 1} de ${totalSlides}`;

                const content = document.getElementById('slideContent');

                let html = `
                            <h2>${slide.titulo}</h2>
                            <div class="subtitulo">${slide.subtitulo}</div>
                            <div class="conteudo">${slide.conteudo}</div>
                        `;

                // Questões
                if (slide.questoes && slide.questoes.length > 0) {
                    html += `<div class="slide-questoes"><h4>📝 Pratique com questões</h4>`;
                    slide.questoes.forEach((q, idx) => {
                        const resp = respostasQuestoes[`${slideAtual}_${idx}`];
                        html += `
                                    <div class="questao-item" data-questao="${slideAtual}_${idx}">
                                        <div class="pergunta">${q.pergunta}</div>
                                        <div class="opcoes">
                                            ${q.opcoes.map((op, oi) => `
                                                <label>
                                                    <input type="radio" name="q${slideAtual}_${idx}" value="${oi}" ${resp !== undefined && resp === oi ? 'checked' : ''}>
                                                    ${op}
                                                </label>
                                            `).join('')}
                                        </div>
                                        <div class="resposta-feedback" id="feedback_${slideAtual}_${idx}"></div>
                                    </div>
                                `;
                    });
                    html += `</div>`;
                }

                content.innerHTML = html;

                // Eventos das questões
                document.querySelectorAll('.questao-item input[type="radio"]').forEach(input => {
                    input.addEventListener('change', function() {
                        const key = this.closest('.questao-item').dataset.questao;
                        const [slideIdx, qIdx] = key.split('_').map(Number);
                        const valor = parseInt(this.value);
                        respostasQuestoes[key] = valor;

                        const feedback = document.getElementById(`feedback_${key}`);
                        const questao = conteudoEstudo[slideIdx].questoes[qIdx];
                        const isCorreto = valor === questao.correta;

                        feedback.className = 'resposta-feedback visivel ' + (isCorreto ? 'correto' : 'errado');
                        feedback.textContent = isCorreto ? '✅ Correta!' :
                            `❌ Incorreta. A resposta correta é: ${questao.opcoes[questao.correta]}`;

                        // Verifica se todas as questões foram respondidas
                        verificarTodasRespondidas();
                    });
                });

                // Verifica respostas já salvas
                document.querySelectorAll('.questao-item').forEach(item => {
                    const key = item.dataset.questao;
                    if (respostasQuestoes[key] !== undefined) {
                        const radio = item.querySelector(`input[value="${respostasQuestoes[key]}"]`);
                        if (radio) radio.checked = true;
                        // Dispara evento para mostrar feedback
                        radio?.dispatchEvent(new Event('change'));
                    }
                });

                // Botões
                document.getElementById('btnAnterior').disabled = slideAtual === 0;
                document.getElementById('btnProximo').textContent = slideAtual === totalSlides - 1 ? '✅ Finalizar' : 'Próximo →';
            }

            function verificarTodasRespondidas() {
                // Não bloqueia navegação, apenas mostra quantas faltam
                const total = conteudoEstudo.length;
                let respondidas = 0;
                let totalQuestoes = 0;

                conteudoEstudo.forEach((slide, si) => {
                    if (slide.questoes) {
                        slide.questoes.forEach((q, qi) => {
                            totalQuestoes++;
                            if (respostasQuestoes[`${si}_${qi}`] !== undefined) {
                                respondidas++;
                            }
                        });
                    }
                });

                if (totalQuestoes > 0 && respondidas === totalQuestoes) {
                    mostrarFeedback('🎉 Todas as questões respondidas! Você pode finalizar.', 'sucesso', 3000);
                }
            }

            // ============================================================
            // NAVEGAÇÃO
            // ============================================================

            document.getElementById('btnAnterior').addEventListener('click', function() {
                if (slideAtual > 0) {
                    slideAtual--;
                    renderizarSlide();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            });

            document.getElementById('btnProximo').addEventListener('click', function() {
                const totalSlides = conteudoEstudo.length;

                // Verifica se as questões atuais foram respondidas
                const slide = conteudoEstudo[slideAtual];
                if (slide.questoes && slide.questoes.length > 0) {
                    const todasRespondidas = slide.questoes.every((q, qi) => {
                        return respostasQuestoes[`${slideAtual}_${qi}`] !== undefined;
                    });
                    if (!todasRespondidas) {
                        mostrarFeedback('⚠️ Responda todas as questões antes de avançar.', 'erro', 3000);
                        return;
                    }
                }

                if (slideAtual === totalSlides - 1) {
                    // Finalizar
                    const totalQuestoes = conteudoEstudo.reduce((acc, s) => acc + (s.questoes ? s.questoes.length : 0), 0);
                    const respondidas = Object.keys(respostasQuestoes).length;
                    const acertos = Object.keys(respostasQuestoes).filter(key => {
                        const [si, qi] = key.split('_').map(Number);
                        return respostasQuestoes[key] === conteudoEstudo[si].questoes[qi].correta;
                    }).length;

                    mostrarFeedback(
                        `🎯 Estudo concluído! ${acertos}/${respondidas} questões corretas.`,
                        'sucesso', 5000
                    );
                    // Salva progresso
                    localStorage.setItem('norvi_estudo_progresso', JSON.stringify({
                        slides: slideAtual + 1,
                        total: totalSlides,
                        acertos,
                        totalQuestoes
                    }));
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 3000);
                    return;
                }

                slideAtual++;
                renderizarSlide();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });

            // ============================================================
            // TEMA
            // ============================================================

            function alternarTema() {
                const html = document.documentElement;
                const atual = html.getAttribute('data-theme');
                const novo = atual === 'dark' ? 'light' : 'dark';
                html.setAttribute('data-theme', novo);
                document.getElementById('temaBtn').textContent = novo === 'dark' ? '☀️' : '🌙';
                localStorage.setItem('norvi_tema', novo);
            }
            const tema = localStorage.getItem('norvi_tema') || 'light';
            document.documentElement.setAttribute('data-theme', tema);
            document.getElementById('temaBtn').textContent = tema === 'dark' ? '☀️' : '🌙';
            document.getElementById('temaBtn').addEventListener('click', alternarTema);

            // ============================================================
            // FEEDBACK
            // ============================================================

            let feedbackTimeout = null;

            function mostrarFeedback(msg, tipo = 'info', duracao = 3500) {
                let el = document.getElementById('feedbackGlobal');
                if (!el) {
                    const d = document.createElement('div');
                    d.id = 'feedbackGlobal';
                    d.className = 'feedback-global';
                    document.body.appendChild(d);
                    el = d;
                }
                if (feedbackTimeout) clearTimeout(feedbackTimeout);
                el.className = 'feedback-global';
                el.textContent = msg;
                void el.offsetWidth;
                el.classList.add('visivel', tipo);
                feedbackTimeout = setTimeout(() => { el.classList.remove('visivel');
                    feedbackTimeout = null; }, duracao);
            }
            window.mostrarFeedback = mostrarFeedback;

            // ============================================================
            // RESTAURAR PROGRESSO
            // ============================================================

            const progressoSalvo = localStorage.getItem('norvi_estudo_progresso');
            if (progressoSalvo) {
                try {
                    const data = JSON.parse(progressoSalvo);
                    if (data.slides && data.slides < conteudoEstudo.length) {
                        slideAtual = data.slides - 1;
                        if (slideAtual < 0) slideAtual = 0;
                    }
                } catch (e) {}
            }

            // ============================================================
            // INICIAR
            // ============================================================

            renderizarSlide();

        })();
    </script>
</body>
</html>
